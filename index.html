  <div class="card">
    <div class="card-header"><span class="section-num">2</span> Rezistivita půdy (4-vodičová metoda)</div>
    <div class="card-body">
      <div class="formula-note" style="margin-bottom:16px;">
        Zadejte přímo naměřenou hodnotu rezistivity $\rho$ pro rozestup sond 1 m. 
        Dle PNE 33 0000-4 ed.6 se pro tento rozestup uvažuje model homogenní půdy.
      </div>

      <div class="grid2">
        <div class="field">
          <label>Naměřená rezistivita $\rho$ (1 m)</label>
          <div style="display:flex; gap:10px; align-items:center;">
            <input type="number" id="manual_rho" min="0" step="0.1" placeholder="zadejte hodnotu">
            <span class="unit">Ωm</span>
          </div>
        </div>
        <div style="display:flex; align-items:flex-end;">
           <button class="btn-calc no-print" onclick="setResistivity()">Potvrdit hodnotu</button>
        </div>
      </div>

      <div id="resis-result" style="margin-top:20px; display:none;">
        <div class="grid2">
          <div class="computed-box" style="background:#1e3a5f; color:#fff;">
            <div class="cv-label" style="color:rgba(255,255,255,0.65);">$\rho_{vyp}$ — výpočtová rezistivita</div>
            <div class="cv-value" id="out_rvyp" style="color:#ffd080; font-size:28px;">—</div>
            <div class="cv-unit" style="color:rgba(255,255,255,0.7);">Ωm</div>
          </div>
          <div class="computed-box">
            <div class="cv-label">Model půdy</div>
            <div class="cv-value" style="font-size:16px;">Homogenní</div>
            <div class="cv-model" style="color:var(--text-soft);">Uvažováno dle kap. 3.2.2</div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
// Původní funkce calcResistivity nahrazena touto zjednodušenou verzí:
function setResistivity() {
  const val = parseFloat(document.getElementById('manual_rho').value);
  
  if (isNaN(val) || val <= 0) {
    alert('Zadejte platnou kladnou hodnotu rezistivity.');
    return;
  }

  // Zápis do výstupu
  document.getElementById('out_rvyp').textContent = val.toFixed(1);
  document.getElementById('resis-result').style.display = 'block';

  // Uložení do globální proměnné pro hlavní výpočet
  window._rvyp = val;
}

// Ostatní funkce (convertRect, updateRequirements, calculate atd.) zůstávají beze změny,
// protože správně pracují s globální proměnnou window._rvyp.
</script>
